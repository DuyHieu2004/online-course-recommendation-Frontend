name: Angular Frontend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: duyhieu2004/my-frontend:latest 

    - name: Deploy to Linux VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST_IP }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          # Di chuyển tới thư mục chứa file docker-compose.yml trên Server
          
          cd /home/azureuser/elearning-project
          
          # Kéo image frontend mới nhất từ Docker Hub về
          sudo docker-compose pull frontend
          
          # Khởi động lại (nó sẽ chỉ update mỗi frontend)
          sudo docker-compose up -d